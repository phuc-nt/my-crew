# Per-model token prices, USD per 1,000,000 tokens. Used to estimate cost for the
# tool-calling engines (create_agent, deep_agent) whose LangChain path does not surface a
# provider cost the way the native path does. A model absent from this table yields
# cost=None (tokens are still recorded — the telemetry never fabricates a number).
#
# SEED PLACEHOLDERS — the operator MUST verify these against real OpenRouter pricing before
# trusting an `estimated` cost row. Wrong numbers do not lie about provenance (the capture
# row is marked cost_source=estimated), but they do skew the magnitude.
models:
  "minimax/minimax-m2.7":
    input_per_1m: 0.30
    output_per_1m: 1.20
  "qwen/qwen3.7-max":
    input_per_1m: 0.80
    output_per_1m: 2.40
