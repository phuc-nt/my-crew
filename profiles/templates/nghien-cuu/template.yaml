# Staff template v1 — prefill source ONLY for the CreateAgent wizard (see
# profiles/templates/pm-coordinator/template.yaml for the full contract note).
#
# `web_search: true` here prefills the wizard's opt-in flag; the created profile.yaml
# gets `web_search: true` (default false for every other role — opt-in). A missing
# TAVILY_API_KEY/BRAVE_API_KEY still degrades the tool to off even when true.
role: "Nghiên cứu"
domain: office
reports: []
bindings_hint: []
web_search: true

# v20.5: runtime backend gợi ý (wizard prefill; user override được).
recommended_runtime: deep_agent

# v32: tool gắn sẵn — OpenAlex tra cứu paper (không cần key; flag là cổng duy nhất).
academic_search: true

# v36 P2: config version — bump when template CONFIG (reports/schedule/tools) changes
# so agents of this role show an upgrade badge. Skills load live (no bump needed).
version: 1
