name: Nghiên cứu
enabled: true
# deep_agent engine cần model tool-calling mạnh để drive create_deep_agent loop.
# minimax-m2.7 (mặc định các nhân sự demo khác) trả choices rỗng → deep loop fail.
model: qwen/qwen3.7-max
budget:
  monthly_usd: 50
  warn_ratio: 0.8
safety:
  dry_run: true
  write_disabled: false
runtime:
  checkpointer: sqlite
  store: memory
  postgres_dsn: ''
thresholds:
  pr_stale_days: 7
  blocker_label_substring: block
  okr_behind_threshold: 0.5
  resource_overload_ratio: 1.5
  labor_cost_per_issue: 0
bindings:
  jira:
    project_key: ''
    token_env: ATLASSIAN_API_TOKEN
  confluence:
    space_key: ''
    space_id: ''
    okr_page_id: ''
    token_env: ATLASSIAN_API_TOKEN
  github:
    repo: ''
  slack:
    report_channel: ''
    stakeholder_channel: ''
    external_channels: []
    token_env_xoxc: SLACK_XOXC_TOKEN
    token_env_xoxd: SLACK_XOXD_TOKEN
schedule: {}
reports: []
integrations: {}
domain: office

# v20.5 demo: deep_agent runtime (shell trong Docker sandbox cách ly)
agent_runtime:
  kind: deep_agent
  sandbox:
    provider: docker
  runtime_loop_limit: 8
